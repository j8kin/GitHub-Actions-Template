name: Create Release

on:
  push:
    branches:
      - main

jobs:
  tag-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Bump patch version
        id: bump
        run: |
          new_version=$(npm version patch --no-git-tag-version | sed 's/^v//')
          echo "version=$new_version" >> $GITHUB_OUTPUT

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }}"
          git push

      - name: Generate release notes
        id: release-notes
        run: |
          previous_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$previous_tag" ]; then
            notes=$(git log --pretty=format:"- %h: %s" | head -20)
          else
            notes=$(git log ${previous_tag}..HEAD --pretty=format:"- %h: %s")
          fi

          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$notes" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create and push git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin "v${{ steps.bump.outputs.version }}"

      - name: Create GitHub Release
        run: |
          gh release create "v${{ steps.bump.outputs.version }}" \
            --target main \
            --title "Release v${{ steps.bump.outputs.version }}" \
            --notes "${{ steps.release-notes.outputs.notes }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync main back to develop
        run: |
          git fetch origin develop
          git checkout develop
          git reset --hard origin/main
          git push --force-with-lease origin develop

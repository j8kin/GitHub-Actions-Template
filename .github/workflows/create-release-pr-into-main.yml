name: Create Release PR

on:
  push:
    branches:
      - develop

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if PR already exists
        id: check-pr
        run: |
          pr_number=$(gh pr list --base main --head develop --json number -q '.[0].number')
          if [ -z "$pr_number" ]; then
            echo "pr_exists=false" >> $GITHUB_OUTPUT
          else
            echo "pr_exists=true" >> $GITHUB_OUTPUT
            echo "pr_number=$pr_number" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version
        id: version
        run: |
          version=$(node -p "require('./package.json').version")
          echo "version=$version" >> $GITHUB_OUTPUT
          IFS='.' read -r major minor patch <<< "$version"
          echo "next_version=$major.$minor.$((patch + 1))" >> $GITHUB_OUTPUT

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Create Pull Request
        if: steps.check-pr.outputs.pr_exists == 'false'
        run: |
          gh pr create \
            --base main \
            --head develop \
            --title "chore: release ${{ steps.version.outputs.next_version }}" \
            --body "Automated release PR. Merge to `main` and tag a new version." \
            --label release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Update Pull Request
        if: steps.check-pr.outputs.pr_exists == 'true'
        run: |
          gh pr edit ${{ steps.check-pr.outputs.pr_number }} \
            --title "chore: release ${{ steps.version.outputs.next_version }}" \
            --body "Automated release PR. Merge to `main` and tag a new version."
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
